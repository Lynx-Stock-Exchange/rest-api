spring.application.name=rest-api

# Kafka Configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=rest-api-group
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=java.util.LinkedHashMap

# Kafka Producer (for admin commands)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

order-book-engine.url=${ORDER_BOOK_ENGINE_URL:http://order-book-engine:8086}
admin-panel.url=${ADMIN_PANEL_URL:http://admin-panel:8083}
price-simulation.url=${PRICE_SIMULATION_URL:http://price-simulation:8080}
market-events.url=${MARKET_EVENTS_URL:http://market-events:8082}
exchange.admin-token=test-token
